<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Challa - CS Engineering Portfolio</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Arial', sans-serif;
  line-height: 1.6;
  color: #333;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}
header {
  background: #1a1a2e;
  color: white;
  padding: 1rem 0;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
nav ul {
  list-style: none;
  display: flex;
  justify-content: center;
}
nav li {
  margin: 0 1.5rem;
}
nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: color 0.3s;
}
nav a:hover {
  color: #00d4ff;
}
section {
  padding: 80px 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
}
#home {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  text-align: center;
}
#home h1 {
  font-size: 3.5rem;
  margin-bottom: 1rem;
}
#home p {
  font-size: 1.5rem;
  margin-bottom: 2rem;
}
.btn {
  display: inline-block;
  background: #ff6b6b;
  color: white;
  padding: 1rem 2rem;
  text-decoration: none;
  border-radius: 50px;
  font-weight: bold;
  transition: transform 0.3s, box-shadow 0.3s;
}
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
/* ... rest of CSS continues ... */
</style>
</head>
<body>
<header>
  <nav class="container">
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>
<section id="home">
  <div class="container">
    <h1>Hi, I'm Deepak Challa</h1>
    <p>CS Engineering Student at Marwadi University | Cybersecurity & Java Enthusiast</p>
    <a href="#contact" class="btn">Get In Touch</a>
  </div>
</section>
<!-- Additional sections: About, Skills, Projects, Contact, Footer -->
</body>
</html>
